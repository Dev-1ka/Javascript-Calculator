<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="styles.css"></link>
    <script src="script.js"></script>
</head>
<body>
    <div id="calcu">
        <h1> CALCULATOR </h1>
        <input type="text" id="display" readonly></input><br><br>
        <div class="keypad">
            <button class="button" onclick="press('1')" value="1">1</button>
            <button class="button" onclick="press('2')" value="2">2</button>
            <button class="button" onclick="press('3')" value="3">3</button>
            <button class="button">AC</button>
            <button class="button" onclick="press('4')" value="4">4</button>
            <button class="button" onclick="press('5')" value="5">5</button>
            <button class="button" onclick="press('6')" value="6">6</button>
            <button class="button">*</button>
            <button class="button" onclick="press('7')" value="7">7</button>
            <button class="button" onclick="press('8')" value="8">8</button>
            <button class="button" onclick="press('9')" value="9">9</button>
            <button class="button">-</button>

            <button class="button">.</button>
            <button class="button" onclick="press('0')" value="0">0</button>
            <button class="button">/</button>
            <button class="button">+</button>
            <button class="button">=</button>
        </div>
    </div>
    <div class="res"></div>
</body>
</html>
